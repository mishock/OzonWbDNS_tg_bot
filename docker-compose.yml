# Что: конфигурация оркестрации контейнера бота.
# Зачем: единый способ сборки/запуска локально и на сервере.
services:
  # Что: единственный сервис приложения.
  # Зачем: бот запускается как один долгоживущий процесс.
  app:
    # Что: путь сборки образа.
    # Зачем: использовать Dockerfile из текущей директории.
    build: .
    # Что: стабильное имя контейнера.
    # Зачем: удобнее смотреть логи и перезапускать сервис.
    container_name: OzonWbDNS_tg_bot
    # Что: подключение переменных окружения.
    # Важно: в .env лежат токены и ключи.
    env_file:
      - .env
    # Что: bind-mount проекта в контейнер.
    # Зачем: изменения в коде сразу доступны контейнеру.
    volumes:
      - ./:/app
    # Что: команда запуска приложения внутри контейнера.
    command: python main.py
    # Что: политика перезапуска.
    # Зачем: повышает живучесть сервиса после сбоев/ребута.
    restart: unless-stopped
